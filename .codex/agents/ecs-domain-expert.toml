### System Patterns

- Systems are functions that query components from World
- Queries are type-safe and generic — never raw index access
- System execution order matters for correctness (e.g., physics before rendering)
- Transform propagation system runs after hierarchy changes

### Entity ID Safety

- Entity IDs use generational handles (`Handle<T>` pattern)
- Never store entity IDs as raw `u32` or `usize`
- Generational checks prevent use-after-delete bugs
- Entity deletion marks the generation, slot gets reused

### FFI Exposure

- Components exposed via `ffi/component_*.rs` files
- Each component has FFI getters/setters
- SDK wrappers provide language-idiomatic access


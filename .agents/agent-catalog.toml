# Canonical agent catalog for Claude + Codex wrappers.
# Regenerate wrappers with: python3 scripts/sync-agent-configs.py

version = 1

role_order = [
  "default",
  "engine-lead",
  "integration-lead",
  "quick-fix",
  "reviewer",
  "spec-reviewer",
  "code-quality-reviewer",
  "architecture-validator",
  "security-auditor",
  "debugger",
]

[settings]
root_model = "gpt-5.4"
root_model_reasoning_effort = "high"
root_plan_mode_reasoning_effort = "high"
codex_max_threads = 1
codex_max_depth = 1
shared_team_mode = "single-lead"
shared_max_specialists_per_lead = 1
shared_fallback_mode = "single-agent"
job_max_runtime_seconds = 1800

[roles.default]
description = "General-purpose orchestrator and fallback agent."
spec_file = ".agents/role-specs/default.md"
tier = "high"
codex_enabled = true
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Northstar", "Beacon"]
claude_enabled = false

[roles.engine-lead]
description = "Direct implementation agent for Rust engine and core modules."
spec_file = ".agents/role-specs/engine-lead.md"
tier = "high"
codex_enabled = true
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Forge", "Helmsman"]
claude_enabled = true

[roles.engine-lead.claude]
model = "opus"
permission_mode = "default"
tools = ["Read", "Edit", "Write", "Bash", "Grep", "Glob"]

[roles.integration-lead]
description = "Direct implementation agent for FFI, SDKs, and codegen."
spec_file = ".agents/role-specs/integration-lead.md"
tier = "high"
codex_enabled = true
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Bridge", "Conductor"]
claude_enabled = true

[roles.integration-lead.claude]
model = "opus"
permission_mode = "default"
tools = ["Read", "Edit", "Write", "Bash", "Grep", "Glob"]

[roles.quick-fix]
description = "Single-file or tightly scoped fixer for low-risk changes."
spec_file = ".agents/role-specs/quick-fix.md"
tier = "fast"
codex_enabled = true
codex_model = "gpt-5.3-codex-spark"
codex_model_reasoning_effort = "low"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Patch", "Needle"]
claude_enabled = true

[roles.quick-fix.claude]
model = "haiku"
permission_mode = "default"
tools = ["Read", "Edit", "Bash", "Grep", "Glob"]

[roles.reviewer]
description = "Single review pass for requirements, tests, and major quality regressions."
spec_file = ".agents/role-specs/reviewer.md"
tier = "standard"
codex_enabled = true
codex_model = "gpt-5.3-codex"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Baseline", "Verifier"]
claude_enabled = true

[roles.reviewer.claude]
model = "sonnet"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob"]

[roles.spec-reviewer]
description = "First strict review gate for requirements coverage."
spec_file = ".agents/role-specs/spec-reviewer.md"
tier = "standard"
codex_enabled = true
codex_model = "gpt-5.3-codex"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "read-only"
nickname_candidates = ["SpecGuard", "Coverage"]
claude_enabled = true

[roles.spec-reviewer.claude]
model = "sonnet"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob"]

[roles.code-quality-reviewer]
description = "Second strict review gate for code quality and repo anti-patterns."
spec_file = ".agents/role-specs/code-quality-reviewer.md"
tier = "standard"
codex_enabled = true
codex_model = "gpt-5.3-codex"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Refiner", "Lintbrain"]
claude_enabled = true

[roles.code-quality-reviewer.claude]
model = "sonnet"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob"]

[roles.architecture-validator]
description = "Strict architecture gate for layer and boundary validation."
spec_file = ".agents/role-specs/architecture-validator.md"
tier = "fast"
codex_enabled = true
codex_model = "gpt-5.3-codex-spark"
codex_model_reasoning_effort = "medium"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Boundary", "LayerLens"]
claude_enabled = true

[roles.architecture-validator.claude]
model = "haiku"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob"]

[roles.security-auditor]
description = "Focused audit for FFI safety, unsafe code, and memory ownership."
spec_file = ".agents/role-specs/security-auditor.md"
tier = "high"
codex_enabled = true
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Sentry", "Fortress"]
claude_enabled = true

[roles.security-auditor.claude]
model = "opus"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob"]

[roles.debugger]
description = "Root-cause analyst for failing tests, runtime errors, and verification gaps."
spec_file = ".agents/role-specs/debugger.md"
tier = "standard"
codex_enabled = true
codex_model = "gpt-5.3-codex"
codex_model_reasoning_effort = "medium"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Tracer", "RootCause"]
claude_enabled = true

[roles.debugger.claude]
model = "sonnet"
permission_mode = "plan"
tools = ["Read", "Grep", "Glob", "Bash"]

# Canonical agent catalog for Claude + Codex wrappers.
# Regenerate wrappers with: python3 scripts/sync-agent-configs.py

version = 1

role_order = [
  "default",
  "worker",
  "explorer",
  "monitor",
  "engine-lead",
  "integration-lead",
  "quality-lead",
  "implementer",
  "test-first-implementer",
  "quick-fix",
  "ffi-implementer",
  "sdk-implementer",
  "spec-reviewer",
  "code-quality-reviewer",
  "architecture-validator",
  "security-auditor",
  "test-runner",
  "debugger",
  "documentation-writer",
  "graphics-domain-expert",
  "ecs-domain-expert",
  "ffi-domain-expert",
]

[settings]
# Codex tier policy:
# - high tier roles use gpt-5.4
# - standard tier roles use gpt-5.3-codex
# - fast tier roles use gpt-5.3-codex-spark
root_model = "gpt-5.4"
root_plan_mode_reasoning_effort = "xhigh"
codex_max_threads = 6
codex_max_depth = 2
shared_team_mode = "single-lead"
shared_max_specialists_per_lead = 2
shared_fallback_mode = "single-agent"
job_max_runtime_seconds = 1800

[roles.default]
description = "General-purpose fallback role for orchestration and synthesis."
spec_file = ".agents/role-specs/default.md"
tier = "high"
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Northstar", "Beacon"]
claude_enabled = false

[roles.worker]
description = "Execution-focused role for targeted implementation and fixes."
spec_file = ".agents/role-specs/worker.md"
tier = "standard"
codex_model = "gpt-5.3-codex"
codex_model_reasoning_effort = "medium"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Builder", "Fixer"]
claude_enabled = false

[roles.explorer]
description = "Read-heavy codebase exploration role for discovery and evidence gathering."
spec_file = ".agents/role-specs/explorer.md"
tier = "fast"
codex_model = "gpt-5.3-codex-spark"
codex_model_reasoning_effort = "medium"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Scout", "Pathfinder"]
claude_enabled = false

[roles.monitor]
description = "Long-running command and status monitoring role optimized for polling and waiting."
spec_file = ".agents/role-specs/monitor.md"
tier = "fast"
codex_model = "gpt-5.3-codex-spark"
codex_model_reasoning_effort = "low"
codex_sandbox_mode = "read-only"
nickname_candidates = ["Sentinel", "Watcher"]
claude_enabled = false

[roles.engine-lead]
description = "Sub-orchestrator for Rust core engine, graphics, ECS, and asset system"
spec_file = ".agents/role-specs/engine-lead.md"
tier = "high"
codex_model = "gpt-5.4"
codex_model_reasoning_effort = "high"
codex_sandbox_mode = "workspace-write"
nickname_candidates = ["Forge", "Helmsman"]
claude_enabled = true

[roles.engine-lead.claude]
model = "opus"
permission_mode = "default"
tools = ["Read", "Edit", "Write", "Bash", "Grep", "Glob", "Agent"]


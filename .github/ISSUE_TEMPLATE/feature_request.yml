name: Feature Request
description: Propose a new feature for GoudEngine
labels: ["type:feature"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should it work?
    validations:
      required: true
  - type: textarea
    id: api
    attributes:
      label: API Design
      description: What would the API look like from the SDK user's perspective?
      render: rust
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Other approaches and why they were rejected
  - type: checkboxes
    id: impact
    attributes:
      label: Impact
      options:
        - label: Requires FFI changes
        - label: Requires codegen changes
        - label: Requires SDK updates
        - label: Breaking change

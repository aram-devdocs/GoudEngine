name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish pipeline (for re-running failed releases)"
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: release-pipeline
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Step 1: release-please creates/updates a Release PR ──
  release-please:
    name: Release Please
    runs-on: ubuntu-latest
    outputs:
      should_publish: ${{ steps.release.outputs.release_created == 'true' || (github.event_name == 'workflow_dispatch' && inputs.force_publish) }}
      tag_name: ${{ steps.release.outputs.tag_name || steps.fallback.outputs.tag_name }}
      version: ${{ steps.release.outputs.version || steps.fallback.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      # On workflow_dispatch, release-please won't set outputs. Read from
      # version.txt so downstream jobs have the version available.
      - name: Fallback version from version.txt
        id: fallback
        if: github.event_name == 'workflow_dispatch'
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Using fallback version: ${VERSION}"

  # ── Step 2a: Build native libraries for all platforms ──
  build-native-libs:
    name: Native Lib (${{ matrix.rid }})
    needs: release-please
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            rid: linux-x64
            lib: libgoud_engine.so
            static_lib: libgoud_engine.a
          - os: macos-latest
            target: x86_64-apple-darwin
            rid: osx-x64
            lib: libgoud_engine.dylib
            static_lib: libgoud_engine.a
          - os: macos-latest
            target: aarch64-apple-darwin
            rid: osx-arm64
            lib: libgoud_engine.dylib
            static_lib: libgoud_engine.a
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            rid: win-x64
            lib: goud_engine.dll
            static_lib: goud_engine.lib
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libasound2-dev libudev-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} -p goud-engine-core

      - name: Verify artifact
        shell: bash
        run: |
          LIB_FILE="target/${{ matrix.target }}/release/${{ matrix.lib }}"
          STATIC_LIB="target/${{ matrix.target }}/release/${{ matrix.static_lib }}"
          HEADER_FILE="codegen/generated/goud_engine.h"
          SIZE=$(stat -c%s "$LIB_FILE" 2>/dev/null || stat -f%z "$LIB_FILE")
          echo "Artifact: $LIB_FILE ($SIZE bytes)"
          if [ "$SIZE" -lt 100000 ]; then
            echo "ERROR: Artifact too small ($SIZE bytes), expected > 100KB"
            exit 1
          fi

          STATIC_SIZE=$(stat -c%s "$STATIC_LIB" 2>/dev/null || stat -f%z "$STATIC_LIB")
          echo "Static artifact: $STATIC_LIB ($STATIC_SIZE bytes)"
          if [ "$STATIC_SIZE" -lt 100000 ]; then
            echo "ERROR: Static artifact too small ($STATIC_SIZE bytes), expected > 100KB"
            exit 1
          fi

          if [ ! -f "$HEADER_FILE" ]; then
            echo "ERROR: Missing generated header: $HEADER_FILE"
            exit 1
          fi

          ARTIFACT_DIR="artifacts/native-${{ matrix.rid }}"
          mkdir -p "$ARTIFACT_DIR/include"
          mkdir -p "$ARTIFACT_DIR/static"
          cp "$LIB_FILE" "$ARTIFACT_DIR/"
          cp "$STATIC_LIB" "$ARTIFACT_DIR/static/"
          cp "$HEADER_FILE" "$ARTIFACT_DIR/include/"

      - uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/native-${{ matrix.rid }}
          if-no-files-found: error
          retention-days: 3

  # ── Step 2a+: Publish native tarballs to GitHub Release ──
  publish-native-tarballs:
    name: Native Tarballs
    needs: [build-native-libs, release-please]
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            lib: libgoud_engine.so
          - rid: osx-x64
            lib: libgoud_engine.dylib
          - rid: osx-arm64
            lib: libgoud_engine.dylib
          - rid: win-x64
            lib: goud_engine.dll
    steps:
      - uses: actions/checkout@v6

      - name: Download native artifact
        uses: actions/download-artifact@v8
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/native-${{ matrix.rid }}

      - name: Create tarball
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          RID: ${{ matrix.rid }}
          LIB: ${{ matrix.lib }}
        run: |
          STAGING="goud-engine-v${VERSION}-${RID}"
          mkdir -p "${STAGING}/lib"
          mkdir -p "${STAGING}/include"
          mkdir -p "${STAGING}/cmake"

          cp "artifacts/native-${RID}/${LIB}" "${STAGING}/lib/"
          cp "artifacts/native-${RID}/include/goud_engine.h" "${STAGING}/include/"
          cp -r sdks/c/include/goud "${STAGING}/include/"
          cp -r sdks/cpp/include/goud/* "${STAGING}/include/goud/"
          cp sdks/cpp/cmake/FindGoudEngine.cmake "${STAGING}/cmake/"
          cp sdks/cpp/cmake/GoudEngineConfig.cmake "${STAGING}/cmake/"

          tar -czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Upload tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          TARBALL="goud-engine-v${VERSION}-${RID}.tar.gz"
          gh release upload "v${VERSION}" "${TARBALL}" --clobber

  # ── Step 2a+++: Publish console-partner static tarballs ──
  publish-console-static-tarballs:
    name: Console Static Tarballs
    needs: [build-native-libs, release-please]
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: linux-x64
            static_lib: libgoud_engine.a
          - rid: osx-x64
            static_lib: libgoud_engine.a
          - rid: osx-arm64
            static_lib: libgoud_engine.a
          - rid: win-x64
            static_lib: goud_engine.lib
    steps:
      - uses: actions/checkout@v6

      - name: Download native artifact
        uses: actions/download-artifact@v8
        with:
          name: native-${{ matrix.rid }}
          path: artifacts/native-${{ matrix.rid }}

      - name: Create console partner tarball
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          RID: ${{ matrix.rid }}
          STATIC_LIB: ${{ matrix.static_lib }}
        run: |
          STAGING="goud-engine-console-v${VERSION}-${RID}"
          mkdir -p "${STAGING}/lib"
          mkdir -p "${STAGING}/include"

          cp "artifacts/native-${RID}/static/${STATIC_LIB}" "${STAGING}/lib/"
          cp "artifacts/native-${RID}/include/goud_engine.h" "${STAGING}/include/"

          tar -czf "${STAGING}.tar.gz" "${STAGING}"

      - name: Upload console partner tarball to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release-please.outputs.version }}
          RID: ${{ matrix.rid }}
        run: |
          TARBALL="goud-engine-console-v${VERSION}-${RID}.tar.gz"
          gh release upload "v${VERSION}" "${TARBALL}" --clobber

  # ── Step 2b: Build napi-rs addons for Node.js ──
  build-napi:
    name: Napi (${{ matrix.name }})
    needs: release-please
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x64-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
            name: darwin-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: win32-x64-msvc
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libasound2-dev libudev-dev

      - name: Generate napi source files
        run: python3 codegen/gen_ts_node.py

      - name: Build napi addon
        working-directory: sdks/typescript
        run: |
          npm ci
          npx napi build --manifest-path native/Cargo.toml --platform --release --output-dir . --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.name }}
          path: sdks/typescript/*.node
          if-no-files-found: error
          retention-days: 3

      - name: Upload napi loader (once)
        if: matrix.name == 'darwin-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: napi-loader
          path: |
            sdks/typescript/index.js
            sdks/typescript/index.d.ts
          if-no-files-found: error
          retention-days: 3

  # ── Step 2c: Build WASM bundle ──
  build-wasm:
    name: WASM
    needs: release-please
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install pinned wasm-pack
        env:
          WASM_PACK_VERSION: "0.13.1"
        run: |
          curl -sSfL "https://github.com/rustwasm/wasm-pack/releases/download/v${WASM_PACK_VERSION}/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl.tar.gz" -o /tmp/wasm-pack.tar.gz
          tar -xzf /tmp/wasm-pack.tar.gz -C /tmp
          sudo install /tmp/wasm-pack-v${WASM_PACK_VERSION}-x86_64-unknown-linux-musl/wasm-pack /usr/local/bin/wasm-pack
          wasm-pack --version

      - name: Build WASM
        working-directory: sdks/typescript
        # wasm-pack already optimizes this bundle; do not run a second manual
        # wasm-opt pass or the browser runtime smoke can regress.
        run: npm run build:wasm

      - uses: actions/upload-artifact@v4
        with:
          name: wasm-bundle
          path: sdks/typescript/wasm/
          if-no-files-found: error
          retention-days: 3

  # ── Step 3: Verify codegen is up to date ──
  codegen-verify:
    name: Codegen Verify
    needs: release-please
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libasound2-dev libudev-dev

      - name: Run full codegen pipeline
        run: ./codegen.sh

      - name: Check for drift
        run: bash scripts/check-generated-artifacts.sh

      - name: Run validators
        run: |
          cd codegen
          python3 validate.py
          python3 validate_coverage.py

      - name: Check layer dependencies
        run: cargo run -p lint-layers

  # ── Step 4: Publish to npm ──
  publish-npm:
    name: Publish npm
    needs: [build-napi, build-wasm, codegen-verify]
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Download napi artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: napi-*
          path: sdks/typescript/
          merge-multiple: true

      - name: Download napi loader
        uses: actions/download-artifact@v8
        with:
          name: napi-loader
          path: sdks/typescript/

      - name: Download WASM bundle
        uses: actions/download-artifact@v8
        with:
          name: wasm-bundle
          path: sdks/typescript/wasm/

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Generate TypeScript source
        run: |
          python3 codegen/gen_ts_node.py
          python3 codegen/gen_ts_web.py

      - name: Build TypeScript
        working-directory: sdks/typescript
        run: |
          npm ci
          npx tsc
          npx tsc -p tsconfig.web.json

      - name: Publish
        working-directory: sdks/typescript
        run: |
          OUTPUT=$(npm publish --provenance --access public --ignore-scripts 2>&1) || {
            if echo "$OUTPUT" | grep -q "cannot publish over the previously published"; then
              echo "Version already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── Step 5: Publish to NuGet ──
  publish-nuget:
    name: Publish NuGet
    needs: [build-native-libs, codegen-verify]
    runs-on: ubuntu-latest
    environment: nuget
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download native libs
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts/

      - name: Stage native libs
        run: |
          mkdir -p sdks/csharp/runtimes/linux-x64/native
          mkdir -p sdks/csharp/runtimes/osx-x64/native
          mkdir -p sdks/csharp/runtimes/osx-arm64/native
          mkdir -p sdks/csharp/runtimes/win-x64/native
          mkdir -p sdks/csharp/include

          cp artifacts/native-linux-x64/libgoud_engine.so    sdks/csharp/runtimes/linux-x64/native/
          cp artifacts/native-osx-x64/libgoud_engine.dylib   sdks/csharp/runtimes/osx-x64/native/
          cp artifacts/native-osx-arm64/libgoud_engine.dylib sdks/csharp/runtimes/osx-arm64/native/
          cp artifacts/native-win-x64/goud_engine.dll        sdks/csharp/runtimes/win-x64/native/
          cp artifacts/native-linux-x64/include/goud_engine.h sdks/csharp/include/

      - name: Build
        run: dotnet build sdks/csharp -c Release

      - name: Pack
        run: dotnet pack sdks/csharp -c Release --no-build

      - name: Push
        run: |
          dotnet nuget push sdks/nuget_package_output/GoudEngine.*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

  # ── Step 6: Publish to PyPI ──
  publish-pypi:
    name: Publish PyPI
    needs: [build-native-libs, codegen-verify]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build wheel

      - name: Download all native libs
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts/

      - name: Build platform wheels
        working-directory: sdks/python
        run: |
          mkdir -p dist
          mkdir -p goud_engine/include
          cp ../../artifacts/native-linux-x64/include/goud_engine.h goud_engine/include/

          declare -A PLATFORMS
          PLATFORMS=(
            ["linux-x64"]="manylinux2014_x86_64:libgoud_engine.so"
            ["osx-x64"]="macosx_13_0_x86_64:libgoud_engine.dylib"
            ["osx-arm64"]="macosx_14_0_arm64:libgoud_engine.dylib"
            ["win-x64"]="win_amd64:goud_engine.dll"
          )

          for rid in "${!PLATFORMS[@]}"; do
            IFS=: read -r plat lib <<< "${PLATFORMS[$rid]}"

            # Copy native lib into package
            cp "../../artifacts/native-${rid}/${lib}" goud_engine/

            # Build wheel
            python -m build --wheel --outdir tmpwheel

            # Retag with platform
            python -m wheel tags \
              --remove \
              --platform-tag="${plat}" \
              --python-tag=py3 \
              --abi-tag=none \
              tmpwheel/*.whl

            mv tmpwheel/*.whl dist/
            rm -rf tmpwheel

            # Clean native lib for next iteration
            rm -f "goud_engine/${lib}"
          done

          # Build source distribution
          python -m build --sdist --outdir dist

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: sdks/python/dist/
          skip-existing: true

  # ── Step 7: Publish to Maven Central ──
  publish-kotlin:
    name: Publish Maven Central
    needs: [build-native-libs, codegen-verify]
    runs-on: ubuntu-latest
    environment: maven
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: temurin

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Download all native libs
        uses: actions/download-artifact@v8
        with:
          pattern: native-*
          path: artifacts/

      - name: Stage native libs into SDK resources
        run: |
          mkdir -p sdks/kotlin/src/main/resources/native/linux-x64
          mkdir -p sdks/kotlin/src/main/resources/native/osx-x64
          mkdir -p sdks/kotlin/src/main/resources/native/osx-arm64
          mkdir -p sdks/kotlin/src/main/resources/native/win-x64

          cp artifacts/native-linux-x64/libgoud_engine.so    sdks/kotlin/src/main/resources/native/linux-x64/
          cp artifacts/native-osx-x64/libgoud_engine.dylib   sdks/kotlin/src/main/resources/native/osx-x64/
          cp artifacts/native-osx-arm64/libgoud_engine.dylib  sdks/kotlin/src/main/resources/native/osx-arm64/
          cp artifacts/native-win-x64/goud_engine.dll         sdks/kotlin/src/main/resources/native/win-x64/

      - name: Generate Kotlin SDK
        run: python3 codegen/gen_kotlin.py

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          # Configure gpg-agent for non-interactive use before importing
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          echo "pinentry-mode loopback" >> ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent

          echo "$GPG_PRIVATE_KEY" | base64 --decode | gpg --batch --import
          gpg --list-secret-keys --keyid-format long

      - name: Build and sign artifacts
        working-directory: sdks/kotlin
        run: ./gradlew publish --no-daemon

      - name: Upload bundle to Central Portal
        working-directory: sdks/kotlin
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_PASSWORD }}
        run: |
          # Create a bundle zip from the local staging directory
          cd build/staging-deploy
          zip -r ../../bundle.zip .

          cd ../..
          # Upload to Sonatype Central Portal
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            -u "${MAVEN_USERNAME}:${MAVEN_PASSWORD}" \
            -F "bundle=@bundle.zip" \
            "https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC")

          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Response: $BODY (HTTP $HTTP_CODE)"

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Successfully uploaded to Central Portal"
          else
            echo "Upload failed with HTTP $HTTP_CODE"
            exit 1
          fi

  # ── Step 8: Publish to crates.io ──
  publish-crates:
    name: Publish crates.io
    needs: codegen-verify
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev libglu1-mesa-dev \
            libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxxf86vm-dev \
            libasound2-dev libudev-dev

      - name: Publish goud_engine_macros
        run: cargo publish -p goud_engine_macros --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published, skipping"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish goud-engine-core
        run: cargo publish -p goud-engine-core --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published, skipping"

      - name: Wait for crates.io index
        run: sleep 30

      - name: Publish goud-engine
        run: cargo publish -p goud-engine --token ${{ secrets.CRATES_IO_TOKEN }} || echo "Already published, skipping"

  # ── Step 9: Publish to LuaRocks ──
  publish-luarocks:
    name: Publish LuaRocks
    needs: [release-please, codegen-verify]
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    environment: luarocks
    steps:
      - uses: actions/checkout@v6

      - name: Install luarocks
        run: |
          sudo apt-get update && sudo apt-get install -y luarocks
          sudo luarocks install dkjson

      - name: Upload rockspec to LuaRocks
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          cd sdks/lua
          # Generate a versioned rockspec from the scm template
          VERSIONED_SPEC="goudengine-${VERSION}-1.rockspec"
          sed \
            -e "s/version = \"scm-1\"/version = \"${VERSION}-1\"/" \
            -e "s|branch = \"main\"|tag = \"v${VERSION}\"|" \
            goudengine-scm-1.rockspec > "${VERSIONED_SPEC}"
          OUTPUT=$(luarocks upload "${VERSIONED_SPEC}" --skip-pack --api-key=${{ secrets.LUAROCKS_API_KEY }} 2>&1) || {
            if echo "$OUTPUT" | grep -qi "already exists"; then
              echo "Version already published, skipping"
            else
              echo "$OUTPUT"
              exit 1
            fi
          }

  # ── Step 10: Trigger Go module proxy ──
  publish-go:
    name: Publish Go Module
    needs: [release-please, codegen-verify]
    if: needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.21'

      - name: Create Go subdirectory tag
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Go modules in subdirectories require a tag prefixed with the module path
          GO_TAG="sdks/go/v${VERSION}"
          git tag "${GO_TAG}" || true
          git push origin "${GO_TAG}" || echo "Tag ${GO_TAG} already exists"

      - name: Trigger Go proxy cache
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          # Request the module from the Go proxy to warm the cache
          GOPROXY=https://proxy.golang.org GO111MODULE=on \
            go list -m github.com/aram-devdocs/GoudEngine/sdks/go@v${VERSION}

  # ── C/C++ Package Managers (vcpkg, Conan) ──
  # vcpkg: Packages are distributed via native tarballs (see publish-native-tarballs).
  # Console partners use the static release archives from publish-console-static-tarballs.
  #        To publish to vcpkg registry, submit a PR to microsoft/vcpkg with the port.
  # Conan: Optional. If CONAN_LOGIN_USERNAME and CONAN_PASSWORD secrets are configured,
  #        add a publish-conan job here. See docs/SECRETS_SETUP.md for details.

  # ── Summary ──
  release-summary:
    name: Release Summary
    needs: [release-please, publish-npm, publish-nuget, publish-pypi, publish-kotlin, publish-crates, publish-native-tarballs, publish-console-static-tarballs, publish-luarocks, publish-go]
    if: always() && needs.release-please.outputs.should_publish == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Summary
        run: |
          VERSION="${{ needs.release-please.outputs.version }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Release v${VERSION}

          | Registry | Package | Status |
          |----------|---------|--------|
          | npm | \`goudengine\` | ${{ needs.publish-npm.result }} |
          | NuGet | \`GoudEngine\` | ${{ needs.publish-nuget.result }} |
          | PyPI | \`goudengine\` | ${{ needs.publish-pypi.result }} |
          | Maven Central | \`goudengine\` | ${{ needs.publish-kotlin.result }} |
          | crates.io | \`goud-engine\` | ${{ needs.publish-crates.result }} |
          | GitHub Release | C/C++ tarballs | ${{ needs.publish-native-tarballs.result }} |
          | GitHub Release | Console static tarballs | ${{ needs.publish-console-static-tarballs.result }} |
          | LuaRocks | \`goudengine\` | ${{ needs.publish-luarocks.result }} |
          | Go Proxy | \`goud-engine-go\` | ${{ needs.publish-go.result }} |
          EOF

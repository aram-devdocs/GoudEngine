name: Phase Gate

on:
  issues:
    types: [closed]

jobs:
  advance-milestone:
    name: Check milestone completion
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Check and advance milestone
        uses: actions/github-script@v8
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const issue = context.payload.issue;
            if (!issue.milestone) {
              console.log('Issue has no milestone, skipping.');
              return;
            }

            const milestone = issue.milestone;
            console.log(`Issue #${issue.number} closed in milestone: ${milestone.title}`);

            // Check if milestone still has open issues
            if (milestone.open_issues > 0) {
              console.log(`Milestone "${milestone.title}" still has ${milestone.open_issues} open issues.`);
              return;
            }

            console.log(`Milestone "${milestone.title}" is complete!`);

            // Define the phase chain
            const phases = [
              'alpha-phase-0',
              'alpha-phase-1',
              'alpha-phase-2',
              'alpha-phase-3',
              'alpha-phase-4',
              'alpha-phase-5',
              'alpha-phase-6'
            ];

            const currentIndex = phases.indexOf(milestone.title);
            if (currentIndex === -1) {
              console.log(`Milestone "${milestone.title}" is not in the phase chain.`);
              return;
            }

            if (currentIndex === phases.length - 1) {
              console.log('Final phase complete! No next phase to advance to.');
              return;
            }

            const nextPhase = phases[currentIndex + 1];
            console.log(`Advancing to next phase: ${nextPhase}`);

            // Find the next milestone
            const milestones = await github.rest.issues.listMilestones({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });

            const nextMilestone = milestones.data.find(m => m.title === nextPhase);
            if (!nextMilestone) {
              console.log(`Next milestone "${nextPhase}" not found or not open.`);
              return;
            }

            // Get all open issues in the next milestone
            let page = 1;
            let labeled = 0;
            while (true) {
              const issues = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                milestone: nextMilestone.number,
                state: 'open',
                per_page: 100,
                page: page
              });

              if (issues.data.length === 0) break;

              for (const nextIssue of issues.data) {
                // Skip if already labeled
                const labels = nextIssue.labels.map(l => typeof l === 'string' ? l : l.name);
                if (labels.includes('agent-ready') || labels.includes('agent-working')) {
                  continue;
                }

                await github.rest.issues.addLabels({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: nextIssue.number,
                  labels: ['agent-ready']
                });
                labeled++;
                console.log(`Labeled issue #${nextIssue.number}: ${nextIssue.title}`);
              }

              page++;
            }

            console.log(`Labeled ${labeled} issues in "${nextPhase}" as agent-ready.`);

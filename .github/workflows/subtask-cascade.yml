name: Subtask Cascade

on:
  pull_request:
    types: [closed]

jobs:
  cascade:
    name: Label next sibling issue
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Generate App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AGENT_APP_ID }}
          private-key: ${{ secrets.AGENT_APP_PRIVATE_KEY }}

      - name: Find and label next sibling
        uses: actions/github-script@v8
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            // Parse "Closes #NNN" / "Fixes #NNN" / "Resolves #NNN" from PR body
            const closePattern = /(?:closes|fixes|resolves)\s+#(\d+)/gi;
            const closedIssues = [];
            let match;
            while ((match = closePattern.exec(body)) !== null) {
              closedIssues.push(parseInt(match[1]));
            }

            if (closedIssues.length === 0) {
              console.log('No closed issues found in PR body.');
              return;
            }

            console.log(`PR #${pr.number} closes issues: ${closedIssues.join(', ')}`);

            for (const issueNumber of closedIssues) {
              let parentNumber = null;

              // Try GitHub sub-issues API first
              try {
                const issue = await github.rest.issues.get({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber
                });

                // Check for parent in body: "Parent: #NNN"
                const issueBody = issue.data.body || '';
                const parentMatch = issueBody.match(/Parent:\s*#(\d+)/i);
                if (parentMatch) {
                  parentNumber = parseInt(parentMatch[1]);
                }
              } catch (e) {
                console.log(`Could not fetch issue #${issueNumber}: ${e.message}`);
                continue;
              }

              // Try sub-issues API to find parent
              if (!parentNumber) {
                try {
                  const response = await github.request(
                    'GET /repos/{owner}/{repo}/issues/{issue_number}/timeline',
                    {
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      issue_number: issueNumber,
                      per_page: 100
                    }
                  );
                  // Look for sub_issue events that reference a parent
                  for (const event of response.data) {
                    if (event.event === 'sub_issue_added' && event.parent) {
                      parentNumber = event.parent.number;
                      break;
                    }
                  }
                } catch (e) {
                  console.log(`Timeline API unavailable for #${issueNumber}: ${e.message}`);
                }
              }

              if (!parentNumber) {
                console.log(`No parent found for issue #${issueNumber}, skipping.`);
                continue;
              }

              console.log(`Issue #${issueNumber} has parent #${parentNumber}`);

              // Find sub-issues of the parent
              let siblings = [];
              try {
                // Try the sub-issues API
                const response = await github.request(
                  'GET /repos/{owner}/{repo}/issues/{issue_number}/sub_issues',
                  {
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: parentNumber,
                    per_page: 100
                  }
                );
                siblings = response.data;
              } catch (e) {
                console.log(`Sub-issues API unavailable for #${parentNumber}: ${e.message}`);
                // Fallback: search for issues with "Parent: #parentNumber" in body
                try {
                  const search = await github.rest.search.issuesAndPullRequests({
                    q: `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open "Parent: #${parentNumber}"`,
                    sort: 'created',
                    order: 'asc',
                    per_page: 100
                  });
                  siblings = search.data.items;
                } catch (searchErr) {
                  console.log(`Search fallback also failed: ${searchErr.message}`);
                  continue;
                }
              }

              // Find next open sibling by issue number order
              const openSiblings = siblings
                .filter(s => s.state === 'open' && s.number !== issueNumber)
                .sort((a, b) => a.number - b.number);

              if (openSiblings.length === 0) {
                console.log(`No open siblings found for parent #${parentNumber}.`);
                continue;
              }

              const nextSibling = openSiblings[0];
              const siblingLabels = nextSibling.labels.map(l => typeof l === 'string' ? l : l.name);

              if (siblingLabels.includes('agent-ready') || siblingLabels.includes('agent-working')) {
                console.log(`Sibling #${nextSibling.number} already has agent label, skipping.`);
                continue;
              }

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: nextSibling.number,
                labels: ['agent-ready']
              });

              console.log(`Labeled sibling #${nextSibling.number}: ${nextSibling.title} as agent-ready`);
            }

name: RFC Auto-Approve

on:
  workflow_dispatch:
  pull_request:
    types: [closed]
    paths:
      - "docs/rfcs/RFC-*.md"

permissions:
  contents: write
  pull-requests: write

jobs:
  approve-rfc:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.base.ref || github.ref }}

      - name: Update RFC status from proposed to accepted
        run: |
          changed=false
          for file in docs/rfcs/RFC-*.md; do
            [ "$file" = "docs/rfcs/RFC-0000-template.md" ] && continue
            [ ! -f "$file" ] && continue
            if head -20 "$file" | grep -q '^status: proposed'; then
              sed -i 's/^status: proposed/status: accepted/' "$file"
              changed=true
              echo "Updated: $file"

              # Update the matching row in docs/rfcs/README.md index
              basename=$(basename "$file")
              sed -i "/$basename/s/| proposed |/| accepted |/" docs/rfcs/README.md
              echo "Updated README.md index for: $basename"
            fi
          done
          if [ "$changed" = false ]; then
            echo "No RFCs to update"
          fi

      - name: Create PR to update RFC status
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: auto-approve merged RFCs [skip ci]"
          branch: chore/rfc-auto-approve
          title: "docs: auto-approve merged RFCs"
          body: "Automatically updates RFC status from `proposed` to `accepted` after merge."
          delete-branch: true
